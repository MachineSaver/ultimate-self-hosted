http:
  middlewares:
    # ──────────────────────────────────────────────────────────
    # authentik — forward auth for non-OIDC services
    # All protected routers reference: middlewares=authentik@file
    # ──────────────────────────────────────────────────────────
    authentik:
      forwardAuth:
        address: "http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
          - X-authentik-jwt
          - X-authentik-meta-jwks
          - X-authentik-meta-outpost
          - X-authentik-meta-provider
          - X-authentik-meta-app
          - X-authentik-meta-version

    # ──────────────────────────────────────────────────────────
    # secure-headers — applied globally via websecure entrypoint in traefik.yml.template
    # ──────────────────────────────────────────────────────────
    secure-headers:
      headers:
        sslRedirect: true
        forceSTSHeader: true
        stsSeconds: 315360000
        stsIncludeSubdomains: true
        stsPreload: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        permissionsPolicy: "camera=(), microphone=(), geolocation=()"
        customFrameOptionsValue: "SAMEORIGIN"

    # ──────────────────────────────────────────────────────────
    # rate-limit — basic DDoS protection
    # ──────────────────────────────────────────────────────────
    rate-limit:
      rateLimit:
        average: 100
        burst: 50

    # ──────────────────────────────────────────────────────────
    # compress — gzip responses
    # ──────────────────────────────────────────────────────────
    compress:
      compress: {}
